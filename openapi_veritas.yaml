openapi: 3.1.0
info:
  title: Veritas Academic API
  version: 1.0.0
  description: API para analizar similitud textual y riesgo compatible con uso de IA.

servers:
  - url: https://veritas-api-ujcl.onrender.com

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    TextRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Texto a analizar
        language:
          type: string
          default: es
          description: Idioma principal del texto
        title:
          type: string
          description: Título opcional del documento
        DocumentAnalysisResponse:
      type: object
      properties:
        title:
          type: string
          nullable: true
        similarity:
          $ref: '#/components/schemas/SimilarityResponse'
        ai_risk:
          $ref: '#/components/schemas/AIRiskResponse'
        overall_risk:
          type: string
          enum:
            - Bajo
            - Medio
            - Alto
            - Indeterminado
        summary:
          type: string
        conclusion:
          type: string
        recommendations:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    SimilarityMatch:
      type: object
      properties:
        text_span:
          type: string
        source_title:
          type: string
        source_url:
          type: string
          nullable: true
        match_percent:
          type: number
        source_type:
          type: string
          enum:
            - web
            - paper
            - student_paper
            - internal
            - unknown
        note:
          type: string
          nullable: true

    SimilarityResponse:
      type: object
      properties:
        overall_similarity:
          type: number
        risk_level:
          type: string
          enum:
            - Bajo
            - Medio
            - Alto
            - Indeterminado
        likely_issue:
          type: string
          enum:
            - sin_hallazgos_relevantes
            - coincidencias_convencionales
            - mala_citacion_potencial
            - parafraseo_cercano_potencial
            - dependencia_fuerte_de_fuentes
            - revision_manual_urgente
        matches:
          type: array
          items:
            $ref: '#/components/schemas/SimilarityMatch'
        notes:
          type: string
        disclaimer:
          type: string

    SuspiciousSegment:
      type: object
      properties:
        text_span:
          type: string
        reason:
          type: string
        signal_strength:
          type: string
          enum:
            - débil
            - moderada
            - fuerte

    AIRiskResponse:
      type: object
      properties:
        ai_risk_score:
          type: number
        risk_level:
          type: string
          enum:
            - Bajo
            - Medio
            - Alto
            - Indeterminado
        segments:
          type: array
          items:
            $ref: '#/components/schemas/SuspiciousSegment'
        notes:
          type: string
        disclaimer:
          type: string

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Verifica estado de la API
      security: []
      responses:
        '200':
          description: API activa
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  environment:
                    type: string
    /analyze_document:
    post:
      operationId: analyzeDocument
      summary: Ejecuta un análisis combinado de similitud, riesgo IA y conclusión general
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextRequest'
      responses:
        '200':
          description: Resultado combinado del análisis del documento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentAnalysisResponse'
        '401':
          description: No autorizado                  

  /check_similarity:
    post:
      operationId: checkSimilarity
      summary: Analiza similitud textual y coincidencias relevantes
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextRequest'
      responses:
        '200':
          description: Resultado de similitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimilarityResponse'
        '401':
          description: No autorizado

  /check_ai_risk:
    post:
      operationId: checkAiRisk
      summary: Estima señales compatibles con uso de IA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextRequest'
      responses:
        '200':
          description: Resultado de riesgo IA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIRiskResponse'
        '401':
          description: No autorizado